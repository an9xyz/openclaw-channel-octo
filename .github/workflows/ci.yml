name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm test
      - name: build (must produce dist/index.js + dist/setup-entry.js)
        run: npm run build
      - name: verify dist/ exists
        run: |
          test -f dist/index.js || (echo "::error::dist/index.js missing after build" && exit 1)
          test -f dist/setup-entry.js || (echo "::error::dist/setup-entry.js missing after build" && exit 1)
          echo "✓ dist/ artifacts present"
      - name: npm pack --dry-run (verify tarball contents)
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.txt
          grep -q 'dist/index.js' /tmp/pack.txt || (echo "::error::dist/index.js not in tarball" && exit 1)
          grep -q 'dist/setup-entry.js' /tmp/pack.txt || (echo "::error::dist/setup-entry.js not in tarball" && exit 1)
          grep -q 'openclaw.plugin.json' /tmp/pack.txt || (echo "::error::openclaw.plugin.json not in tarball" && exit 1)
          echo "✓ tarball contains required files"
