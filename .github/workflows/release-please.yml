name: Release Please

# Maintains a long-lived "chore(release): release vX.Y.Z" PR that accumulates
# version bump + CHANGELOG entries from conventional commits merged into main.
# Merging that PR creates the tag and a GitHub Release, which triggers
# publish-clawhub.yml to package and publish to ClawHub.
#
# This replaces the previous release-drafter workflow. See CONTRIBUTING.md
# "Release process" for the developer-facing workflow.
#
# IMPORTANT — token choice (RELEASE_PLEASE_TOKEN, not GITHUB_TOKEN):
# GitHub deliberately suppresses workflow runs caused by the default
# GITHUB_TOKEN (to prevent runaway loops). If release-please uses
# GITHUB_TOKEN to (a) open the release PR or (b) push the release tag,
# neither `pull_request_target` triggers (auto-add-to-project,
# release-please-sprint-bind) nor the `push: tags` trigger of
# publish-clawhub.yml will fire. The whole chain silently breaks.
#
# We therefore use a dedicated PAT stored in `RELEASE_PLEASE_TOKEN`.
# Required PAT scopes (Classic): `repo` (covers contents + PRs).
# Required PAT scopes (Fine-grained, repo-scoped to this repo):
#   - Contents: Read and write
#   - Pull requests: Read and write
# See: https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  # Serialize runs against the release branch. release-please reconciles via
  # force-push to `release-please--branches--main`; two concurrent runs racing
  # to that branch can produce a corrupted/half-updated release PR (wrong
  # version, missing CHANGELOG entries). cancel-in-progress: false lets a
  # second push wait for the first to finish rather than be dropped.
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-24.04
    permissions:
      # release-please uses its own RELEASE_PLEASE_TOKEN PAT for all writes.
      # GITHUB_TOKEN is intentionally restricted to `contents: read` here:
      # if RELEASE_PLEASE_TOKEN is ever unset / expired / renamed, the action
      # falls back to GITHUB_TOKEN and PR creation fails loudly with 403
      # rather than silently degrading to bot-author mode (which would
      # re-introduce the GITHUB_TOKEN trigger-suppression bug we're trying
      # to avoid — see the comment block at the top of this file).
      contents: read
    steps:
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.2.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
